<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrewPlan Pro - Planificación Viva</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBSaIzbcFiyTF1zy9_9Z97ZSPfL322xO24",
            authDomain: "inventariochuyma-da052.firebaseapp.com",
            projectId: "inventariochuyma-da052",
            storageBucket: "inventariochuyma-da052.firebasestorage.app",
            messagingSenderId: "677439195293",
            appId: "1:677439195293:web:50b624de9e0c877c89ec74"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const CHILEAN_HOLIDAYS = ["2026-01-01", "2026-04-03", "2026-04-04", "2026-05-01", "2026-05-21", "2026-06-29", "2026-07-16", "2026-08-15", "2026-09-18", "2026-09-19", "2026-10-12", "2026-10-31", "2026-11-01", "2026-12-08", "2026-12-25"];

        // Motor lógico de días hábiles
        function isWorkingDay(date, phaseName) {
            const day = date.getDay();
            const dateStr = date.toISOString().split('T')[0];
            const isHoliday = CHILEAN_HOLIDAYS.includes(dateStr);
            if (day === 0 || isHoliday) return false;
            if (day === 6) {
                // Solo Cocción bloqueada
                return phaseName !== 'Cocción';
            }
            return true;
        }

        function addDaysWork(startDate, offset, phaseName) {
            let result = new Date(startDate);
            let added = 0;
            while (added < offset) {
                result.setDate(result.getDate() + 1);
                if (isWorkingDay(result, phaseName)) added++;
            }
            return result.toISOString().split('T')[0];
        }

        const RECIPES = {
            amber: { 
                name: 'Amber Ale', 
                phases: [
                    { name: 'Cocción', offset: 0 }, 
                    { name: 'Inicio de fermentación', offset: 1 }, 
                    { name: 'Dry Hop', offset: 7 }, 
                    { name: 'Descanso de Diacetilo', offset: 8 },
                    { name: 'Trasvasije a Maduración', offset: 9 },
                    { name: 'Maduración', offset: 10 }, 
                    { name: 'Trasiego a Carbonatación', offset: 15 },
                    { name: 'Envasado', offset: 16 }
                ] 
            },
            pale: { 
                name: 'Pale Ale', 
                phases: [
                    { name: 'Cocción', offset: 0 }, 
                    { name: 'Inicio de fermentación', offset: 1 }, 
                    { name: 'Descanso de Diacetilo', offset: 7 }, 
                    { name: 'Trasvasije a Maduración', offset: 8 },
                    { name: 'Maduración', offset: 9 }, 
                    { name: 'Trasiego a Carbonatación', offset: 15 },
                    { name: 'Envasado', offset: 16 }
                ] 
            }
        };

        window.login = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value).catch(e => alert(e.message));
        window.logout = () => signOut(auth);

        window.addBatches = async () => {
            const recipeKey = document.getElementById('recipeSelect').value;
            const count = parseInt(document.getElementById('batchCount').value);
            const startDateValue = document.getElementById('startDate').value;
            if (!startDateValue) return;
            
            let currentStart = new Date(startDateValue);
            for (let i = 0; i < count; i++) {
                const batch = {
                    recipeKey: recipeKey,
                    recipeName: RECIPES[recipeKey].name,
                    phases: RECIPES[recipeKey].phases.map(p => ({
                        name: p.name,
                        offset: p.offset,
                        date: addDaysWork(currentStart, p.offset, p.name)
                    })),
                    createdAt: new Date()
                };
                await addDoc(collection(db, "brewplan_data"), batch);
                currentStart.setDate(currentStart.getDate() + 1);
            }
            loadData();
        };

        window.saveBatch = async (id, recipeKey) => {
            const phaseContainer = document.getElementById(`phases-${id}`);
            const inputs = phaseContainer.querySelectorAll('input');
            
            // Tomamos el cambio del usuario y recalculamos todo basado en el offset original
            const changedInput = event.target;
            const changedIndex = parseInt(changedInput.dataset.index);
            const newDate = new Date(changedInput.value);
            const offsetOfChanged = RECIPES[recipeKey].phases[changedIndex].offset;

            // Recalculamos la fecha de inicio efectiva (Cocción)
            // startTime = fecha_nueva - offset_de_la_tarea_editada
            // Como las fechas en JS son complejas, simplificamos:
            let effectiveStartDate = new Date(newDate);
            effectiveStartDate.setDate(effectiveStartDate.getDate() - offsetOfChanged);

            // Generamos todas las fases nuevas
            const updatedPhases = RECIPES[recipeKey].phases.map((p, index) => ({
                name: p.name,
                offset: p.offset,
                date: addDaysWork(effectiveStartDate, p.offset, p.name)
            }));

            await updateDoc(doc(db, "brewplan_data", id), { phases: updatedPhases });
            loadData();
        };

        window.loadData = async () => {
            const q = query(collection(db, "brewplan_data"), orderBy("createdAt", "desc"));
            const snapshot = await getDocs(q);
            const container = document.getElementById('dashboard');
            container.innerHTML = '';
            snapshot.forEach(docSnap => {
                const b = docSnap.data();
                const div = document.createElement('div');
                div.className = "bg-white p-6 rounded-3xl shadow-sm border border-purple-100 mb-4";
                div.innerHTML = `
                    <div class="flex justify-between items-center mb-4 border-b border-purple-50 pb-3">
                        <h3 class="font-bold text-purple-900 text-lg tracking-tight">${b.recipeName}</h3>
                        <button onclick="deleteBatch('${docSnap.id}')" class="text-rose-400 text-xs font-semibold uppercase tracking-widest hover:text-rose-600">Eliminar</button>
                    </div>
                    <div class="space-y-3" id="phases-${docSnap.id}">
                        ${b.phases.map((p, index) => `
                            <div class="flex justify-between items-center text-sm">
                                <span class="font-medium text-purple-700">${p.name}</span>
                                <input type="date" value="${p.date}" data-index="${index}" onchange="saveBatch('${docSnap.id}', '${b.recipeKey}')" class="bg-purple-50 p-1 rounded-lg text-purple-950 font-bold tabular-nums outline-none focus:ring-2 focus:ring-purple-200">
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(div);
            });
        };

        window.deleteBatch = async (id) => { await deleteDoc(doc(db, "brewplan_data", id)); loadData(); };

        onAuthStateChanged(auth, (user) => {
            if (user) { document.getElementById('login-screen').classList.add('hidden'); document.getElementById('app-screen').classList.remove('hidden'); loadData(); }
            else { document.getElementById('login-screen').classList.remove('hidden'); document.getElementById('app-screen').classList.add('hidden'); }
        });
    </script>
</head>
<body class="bg-purple-50 min-h-screen p-4 md:p-8">
    <div id="login-screen" class="max-w-md mx-auto mt-20 bg-white p-10 rounded-3xl shadow-2xl border border-purple-100">
        <h1 class="text-3xl font-bold text-purple-950 mb-8 text-center tracking-tight">BrewPlan Pro</h1>
        <input type="email" id="email" placeholder="Correo" class="w-full p-4 border border-purple-100 rounded-2xl mb-4 bg-purple-50 outline-none focus:ring-2 focus:ring-purple-200">
        <input type="password" id="password" placeholder="Clave" class="w-full p-4 border border-purple-100 rounded-2xl mb-8 bg-purple-50 outline-none focus:ring-2 focus:ring-purple-200">
        <button onclick="login()" class="w-full bg-purple-900 text-white py-4 rounded-2xl font-bold hover:bg-purple-800 transition">Ingresar</button>
    </div>

    <div id="app-screen" class="hidden max-w-xl mx-auto">
        <div class="flex justify-between items-end mb-8">
            <h1 class="text-4xl font-bold text-purple-950 tracking-tight">Planificador</h1>
            <button onclick="logout()" class="text-purple-400 text-sm hover:text-purple-600 font-medium">Salir</button>
        </div>
        <div class="bg-white p-8 rounded-3xl shadow-sm border border-purple-100 mb-8">
            <label class="block text-purple-500 text-xs font-bold uppercase tracking-widest mb-2">Receta</label>
            <select id="recipeSelect" class="w-full p-4 bg-purple-50 border border-purple-100 rounded-2xl mb-5 font-medium text-purple-900 outline-none">
                <option value="amber">Amber Ale</option>
                <option value="pale">Pale Ale</option>
            </select>
            <div class="grid grid-cols-2 gap-4 mb-5">
                <div>
                    <label class="block text-purple-500 text-xs font-bold uppercase tracking-widest mb-2">Fecha Inicio</label>
                    <input type="date" id="startDate" class="w-full p-4 bg-purple-50 border border-purple-100 rounded-2xl text-purple-900 outline-none">
                </div>
                <div>
                    <label class="block text-purple-500 text-xs font-bold uppercase tracking-widest mb-2">Lotes</label>
                    <input type="number" id="batchCount" value="1" min="1" class="w-full p-4 bg-purple-50 border border-purple-100 rounded-2xl text-purple-900 outline-none">
                </div>
            </div>
            <button onclick="addBatches()" class="w-full bg-purple-800 text-white py-4 rounded-2xl font-bold hover:bg-purple-900 transition">Programar Producción</button>
        </div>
        <div id="dashboard" class="space-y-4"></div>
    </div>
</body>
</html>
